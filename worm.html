<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>worm</title>
  <link href="stylesheets/worm.css" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
    }

    body {
      margin: 0;
      background: transparent;
      overflow: hidden;
      height: 100vh;
      display: flex;
      align-items: center;
    }

    #worm {
      width: 100vw;
      height: 15px;
    }
  </style>
</head>

<body>
  <div id="worm" class="worm-body">
    <div class="segment"></div>
    <div class="segment"></div>
    <div class="segment"></div>
    <div class="segment"></div>
    <div class="segment"></div>
    <div class="segment"></div>
    <div class="segment"></div>
    <div class="segment"></div>
    <div class="segment"></div>
    <div class="segment"></div>
  </div>

  <script>
    const minWidth = 170;
    const maxWidth = 240;
    const windowHeight = 21;
    const cycleFrames = 30;
    const pauseFrames = 18;

    let frame = 0;
    let pauseFrame = 0;
    let animationInterval;
    let phase = 'stretch';

    /*
     * butterfly.html: no resize on load, so screenX/screenY match window.open(left,top).
     * Here we resize immediately; the OS often moves the window, and screenX/Y can be 0
     * in inline script. Spawn position comes from query params (set by openWormWindow).
     */
    const q = new URLSearchParams(window.location.search);
    let anchorLeft = parseInt(q.get('spawnLeft'), 10);
    let anchorY = parseInt(q.get('spawnTop'), 10);
    if (!Number.isFinite(anchorLeft) || !Number.isFinite(anchorY)) {
      anchorLeft = window.screenX;
      anchorY = window.screenY;
    }
    if (anchorLeft === 0 && anchorY === 0) {
      anchorLeft = window.screen.width - 82;
      anchorY = Math.round(window.screen.height / 2) - 16;
    }

    if (window.resizeTo) {
      window.resizeTo(minWidth, windowHeight);
    }

    if (window.moveTo) {
      window.moveTo(anchorLeft, anchorY);
    }

    function animate() {
      const widthRange = maxWidth - minWidth;
      const progress = frame / cycleFrames;
      const width = phase === 'pause'
        ? minWidth
        : Math.round(
          phase === 'stretch'
            ? minWidth + (progress * widthRange)
            : maxWidth - (progress * widthRange)
        );

      let x;

      if (phase === 'stretch') {
        x = anchorLeft;
      } else if (phase === 'contract') {
        const anchorRight = anchorLeft + maxWidth;
        x = anchorRight - width;
      } else {
        x = anchorLeft;
      }

      if (x + width >= window.screen.availWidth) {
        clearInterval(animationInterval);
        window.close();
        return;
      }

      if (window.resizeTo) {
        window.resizeTo(width, windowHeight);
      }

      if (window.moveTo) {
        window.moveTo(x, anchorY);
      }

      if (phase === 'pause') {
        pauseFrame += 1;
        if (pauseFrame > pauseFrames) {
          phase = 'stretch';
          pauseFrame = 0;
        }
        return;
      }

      frame += 1;

      if (frame > cycleFrames) {
        if (phase === 'stretch') {
          phase = 'contract';
        } else {
          anchorLeft += widthRange;
          phase = 'pause';
          pauseFrame = 0;
        }
        frame = 0;
      }
    }

    setTimeout(() => {
      animationInterval = setInterval(animate, 1000 / 10);
    }, 1000);
  </script>
</body>

</html>
